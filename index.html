<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDC | Tecnologia e Inteligência para Negócios</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- ESTILOS GLOBAIS E RESET --- */
        :root {
            --bg-color: #0a0f1d;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            overflow-x: hidden; 
            position: relative;
        }

        /* Fundo Dinâmico Seguro */
        #network-canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; opacity: 0.3; pointer-events: none;
        }

        /* --- CABEÇALHO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background: rgba(10, 15, 29, 0.9);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 40px; width: auto; transition: transform 0.3s ease; }
        .logo-img:hover { transform: scale(1.05); }

        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-locked { color: #64748b !important; }

        .btn-client { color: var(--accent) !important; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 6px; }
        .btn-client:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-whatsapp {
            display: flex; align-items: center; gap: 8px;
            background: #25D366; color: white; padding: 0.6rem 1.2rem;
            border-radius: 8px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); transition: 0.3s;
        }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
        .whatsapp-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- SEÇÃO HERO --- */
        .hero {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 180px 5% 100px 5%; min-height: 100vh; position: relative; z-index: 10;
        }

        .hero h1 { font-size: 3.5rem; line-height: 1.2; margin-bottom: 1rem; font-weight: 800; }
        .hero h1 span { color: var(--primary); }
        
        .hero-subtitle { 
            max-width: 800px; margin: 0 auto 3rem auto; color: #94a3b8; 
            font-size: 1.2rem; line-height: 1.6; 
        }

        /* Contadores Integrados */
        .stats-wrapper { width: 100%; max-width: 900px; margin: 0 auto 3.5rem auto; }
        .stats-flex { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        .stat-item { flex: 1; min-width: 200px; padding: 1rem; transition: transform 0.3s; }
        .stat-item:hover { transform: translateY(-5px); }
        
        .stat-icon { color: var(--accent); margin-bottom: 15px; display: inline-flex; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 50%; }
        .stat-icon svg { width: 28px; height: 28px; stroke-width: 2.5; }
        
        .stat-number { font-size: 2.8rem; font-weight: 800; color: #ffffff; line-height: 1; margin-bottom: 8px; }
        .stat-label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDC | Tecnologia e Inteligência para Negócios</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- 1. ESTILOS GLOBAIS --- */
        :root {
            --bg-color: #0a0f1d;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            overflow-x: hidden; 
        }

        #network-canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; opacity: 0.3; pointer-events: none;
        }

        /* --- 2. CABEÇALHO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(10, 15, 29, 0.95);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 40px; width: auto; transition: transform 0.3s ease; }
        .logo-img:hover { transform: scale(1.05); }

        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-locked { color: #64748b !important; }

        .btn-client { color: var(--accent) !important; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 6px; }
        .btn-client:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-whatsapp {
            display: flex; align-items: center; gap: 8px;
            background: #25D366; color: white; padding: 0.6rem 1.2rem;
            border-radius: 8px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); transition: 0.3s; white-space: nowrap;
        }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
        .whatsapp-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- 3. SEÇÃO HERO E CONTADORES --- */
        /* Removido o Flexbox vertical que causava colapso. Usando blocos puros. */
        .hero {
            padding: 160px 5% 60px 5%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero h1 { font-size: 3.5rem; line-height: 1.2; margin-bottom: 1.5rem; font-weight: 800; }
        .hero h1 span { color: var(--primary); }
        .hero-subtitle { max-width: 800px; margin: 0 auto 3rem auto; color: #94a3b8; font-size: 1.15rem; line-height: 1.6; }

        .stats-wrapper { width: 100%; max-width: 1200px; margin: 0 auto 4rem auto; }
        .stats-flex { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        
        /* Contadores Transparentes e Limpos */
        .stat-item { flex: 1 1 200px; text-align: center; padding: 1rem 0; }
        .stat-icon { color: var(--accent); margin-bottom: 15px; display: inline-block; }
        .stat-icon svg { width: 45px; height: 45px; stroke-width: 2; }
        .stat-number { font-size: 3.2rem; font-weight: 800; color: #ffffff; line-height: 1; margin-bottom: 5px; }
        .stat-label { color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        .hero-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
        .btn-primary { background: var(--primary); color: white; padding: 14px 36px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; font-size: 1.05rem; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: transparent; color: white; border: 1px solid #475569; padding: 14px 36px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; font-size: 1.05rem; }
        .btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.05); }

        /* --- 4. CASES DE SUCESSO (ESTEIRA MAIOR E FLUIDA) --- */
        .clients-section { width: 100%; padding: 3rem 0; border-top: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; z-index: 10; }
        .clients-title { text-align: center; font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2.5rem; font-weight: bold; }
        
        .marquee-container { width: 100%; overflow: hidden; position: relative; display: flex; }
        
        /* Máscaras de borda */
        .marquee-container::before, .marquee-container::after { content: ""; position: absolute; top: 0; width: 100px; height: 100%; z-index: 2; pointer-events: none; }
        .marquee-container::before { left: 0; background: linear-gradient(to right, var(--bg-color) 0%, transparent 100%); }
        .marquee-container

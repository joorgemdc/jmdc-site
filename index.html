<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDC | Tecnologia e Inteligência para Negócios</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- ESTILOS GLOBAIS --- */
        :root {
            --bg-color: #0a0f1d;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; overflow-x: hidden; }

        #network-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.4; }

        /* --- CABEÇALHO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background: rgba(10, 15, 29, 0.85);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 45px; width: auto; transition: transform 0.3s ease; }
        .logo-img:hover { transform: scale(1.05); filter: brightness(1.1); }

        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-locked { color: #64748b !important; }

        .btn-client { color: var(--accent) !important; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 6px; }
        .btn-client:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-whatsapp {
            display: flex; align-items: center; gap: 8px;
            background: #25D366; color: white; padding: 0.6rem 1.2rem;
            border-radius: 8px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transition: 0.3s;
        }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4); }
        .whatsapp-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- HERO & CONTADORES (REVISADO) --- */
        .hero {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 150px 5% 80px 5%; min-height: 100vh;
        }

        .hero h1 { font-size: 3.5rem; line-height: 1.2; margin-bottom: 1.5rem; font-weight: 800; }
        .hero h1 span { color: var(--primary); }
        .hero-subtitle { max-width: 750px; margin: 0 auto 2rem auto; color: #94a3b8; font-size: 1.15rem; line-height: 1.6; }

        .stats-wrapper { width: 100%; max-width: 900px; margin: 0 auto 3rem auto; }
        .stats-flex { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        .stat-item { flex: 1; min-width: 220px; padding: 1rem; transition: transform 0.3s; }
        .stat-item:hover { transform: translateY(-5px); }
        
        .stat-icon { color: var(--accent); margin-bottom: 12px; display: inline-flex; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 50%; }
        .stat-icon svg { width: 32px; height: 32px; stroke-width: 2.5; }
        
        .stat-number { font-size: 2.5rem; font-weight: 800; color: #ffffff; line-height: 1; margin-bottom: 8px; }
        .stat-label { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .hero-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; width: 100%; }
        .btn-primary { background: var(--primary); color: white; padding: 12px 32px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5); }
        .btn-secondary { background: transparent; color: white; border: 1px solid #475569; padding: 12px 32px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.05); }

        /* --- CARROSSEL DE SERVIÇOS --- */
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 3rem; font-weight: 800; padding-top: 2rem; }
        .carousel-container { position: relative; max-width: 1200px; margin: 0 auto; overflow: hidden; padding: 20px 0; }
        .carousel-track { display: flex; gap: 20px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }
        
        .expert-card {
            flex: 0 0 320px; scroll-snap-align: center; background: rgba(30, 41, 59, 0.25);
            backdrop-filter: blur(8px); border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px; padding: 2rem; text-align: left; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .expert-card:hover { background: rgba(30, 41, 59, 0.4); border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.2); }
        .expert-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--accent)); opacity: 0.7; }
        .expert-icon { width: 50px; height: 50px; margin-bottom: 1.5rem; color: #60a5fa; background: rgba(59, 130, 246, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .expert-icon svg { width: 28px; height: 28px; }
        .expert-card h3 { color: #f1f5f9; font-size: 1.25rem; margin-bottom: 1rem; font-weight: 700; }
        .expert-card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; }

        .carousel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 24px; border-radius: 4px; }

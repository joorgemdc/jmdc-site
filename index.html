<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDC | Tecnologia e Inteligência para Negócios</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- ESTILOS GLOBAIS --- */
        :root {
            --bg-color: #0a0f1d;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            overflow-x: hidden; 
        }

        #network-canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; opacity: 0.3; pointer-events: none;
        }

        /* --- CABEÇALHO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(10, 15, 29, 0.95);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 40px; width: auto; transition: transform 0.3s ease; }
        .logo-img:hover { transform: scale(1.05); }

        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-locked { color: #64748b !important; }

        .btn-client { color: var(--accent) !important; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 6px; }
        .btn-client:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-whatsapp {
            display: flex; align-items: center; gap: 8px;
            background: #25D366; color: white; padding: 0.6rem 1.2rem;
            border-radius: 8px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); transition: 0.3s; white-space: nowrap;
        }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
        .whatsapp-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- SEÇÃO HERO --- */
        .hero {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 150px 5% 20px 5%;
        }

        .hero h1 { font-size: 3.2rem; line-height: 1.2; margin-bottom: 1rem; font-weight: 800; }
        .hero h1 span { color: var(--primary); }
        .hero-subtitle { max-width: 800px; margin: 0 auto 2.5rem auto; color: #94a3b8; font-size: 1.15rem; line-height: 1.6; }

        /* Contadores Transparentes */
        .stats-wrapper { width: 100%; max-width: 1000px; margin: 0 auto 3rem auto; }
        .stats-flex { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        
        .stat-item { 
            flex: 1 1 200px; text-align: center; padding: 10px;
        }
        .stat-icon { color: var(--accent); margin-bottom: 10px; display: inline-flex; }
        .stat-icon svg { width: 36px; height: 36px; stroke-width: 2; }
        .stat-number { font-size: 3rem; font-weight: 800; color: #ffffff; line-height: 1; margin-bottom: 5px; }
        .stat-label { color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* Botões Call to Action */
        .hero-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; width: 100%; margin-bottom: 3rem; }
        .btn-primary { background: var(--primary); color: white; padding: 14px 36px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; font-size: 1.05rem; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: transparent; color: white; border: 1px solid #475569; padding: 14px 36px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: 0.3s; font-size: 1.05rem; }
        .btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.05); }

        /* --- CASES DE SUCESSO (ESTEIRA SIMPLES E SEGURA) --- */
        .clients-section { width: 100%; padding: 2rem 0 4rem 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .clients-title { text-align: center; font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem; font-weight: bold; }
        
        .marquee { width: 100%; max-width: 1200px; margin: 0 auto; overflow: hidden; position: relative; white-space: nowrap; }
        .marquee::before, .marquee::after { content: ''; position: absolute; top: 0; width: 100px; height: 100%; z-index: 2; pointer-events: none; }
        .marquee::before { left: 0; background: linear-gradient(to right, var(--bg-color), transparent); }
        .marquee::after { right: 0; background: linear-gradient(to left, var(--bg-color), transparent); }

        .marquee-content { display: inline-block; animation: marquee-scroll 40s linear infinite; }
        .marquee-content:hover { animation-play-state: paused; }
        
        .marquee-content img { 
            height: 70px; width: auto; max-width: 200px; object-fit: contain; 
            margin: 0 30px; vertical-align: middle;
            filter: grayscale(100%) opacity(0.6); transition: 0.3s ease; cursor: pointer;
        }
        .marquee-content img:hover { filter: grayscale(0%) opacity(1); transform: scale(1.05); }

        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- CARROSSEL DE SERVIÇOS TRANSPARENTE --- */
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 3rem; font-weight: 800; padding-top: 2rem; }
        .carousel-container { position: relative; max-width: 1200px; margin: 0 auto; overflow: hidden; padding: 20px 0; }
        .carousel-track { display: flex; gap: 30px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }
        
        .expert-card {
            flex: 0 0 320px; scroll-snap-align: center; background: transparent;
            border-left: 2px solid rgba(59, 130, 246, 0.4); padding: 1rem 2rem; text-align: left; transition: 0.3s ease;
        }
        .expert-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .expert-icon { margin-bottom: 1.2rem; color: var(--primary); }
        .expert-icon svg { width: 36px; height: 36px; stroke-width: 1.5; }
        .expert-card h3 { color: #ffffff; font-size: 1.3rem; margin-bottom: 1rem; font-weight: 700; }
        .expert-card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; }

        .carousel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 8px; height: 8px; background: #334155; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 24px; border-radius: 4px; }

        /* --- CONTATO --- */
        #contato { padding: 5rem 5%; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 0.8)); }
        .form-container { max-width: 600px; margin: 0 auto; background: rgba(30, 41, 59, 0.2); padding: 2.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .form-container input, .form-container textarea { width: 100%; padding: 14px; margin-bottom: 1rem; background: rgba(10, 15, 29, 0.8); border: 1px solid #334155; color: white; border-radius: 8px; outline: none; font-size: 1rem; transition: 0.3s; }
        .form-container input:focus, .form-container textarea:focus { border-color: var(--primary); }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #2563eb; }

        footer { text-align: center; padding: 2rem; border-top: 1px solid rgba(255,255,255,0.05); color: #64748b; font-size: 0.9rem; }

        /* --- RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            header { padding: 12px 15px !important; gap: 5px; }
            .logo-img { height: 30px !important; }
            .nav-links { display: none; }
            .btn-whatsapp { padding: 6px 10px !important; font-size: 0.75rem !important; }
            
            .hero { padding-top: 120px; }
            .hero h1 { font-size: 2.2rem; }
            
            .stats-flex { flex-direction: column; gap: 2rem; }
            .stat-item { width: 100%; }
            .stat-number { font-size: 2.8rem; }
            
            .marquee-content img { height: 50px; margin: 0 15px; }
            
            .expert-card { flex: 0 0 85%; padding: 1rem; }
        }
    </style>
</head>

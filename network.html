<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDC Tools | Diagnóstico de Redes</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- ESTILOS GLOBAIS --- */
        :root {
            --bg-color: #0a0f1d;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --secondary: #1e293b;
            --accent: #10b981;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(59, 130, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-color); 
            line-height: 1.6; overflow-x: hidden; position: relative;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* FUNDO ANIMADO */
        #network-canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 0; opacity: 0.3; pointer-events: none;
        }

        main { position: relative; z-index: 10; flex: 1; }

        /* --- CABEÇALHO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(10, 15, 29, 0.95);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 40px; width: auto; transition: transform 0.3s ease; }
        .logo-img:hover { transform: scale(1.05); }

        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-locked { color: var(--primary) !important; font-weight: bold; }

        .btn-client { color: var(--accent) !important; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 6px; }
        .btn-client:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-whatsapp {
            display: flex; align-items: center; gap: 8px; background: #25D366; color: white; 
            padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); transition: 0.3s; white-space: nowrap;
        }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
        .whatsapp-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- TÍTULO DA PÁGINA --- */
        .page-header { text-align: center; padding: 140px 5% 40px 5%; }
        .page-header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; }
        .page-header span { color: var(--primary); }
        .page-header p { color: #94a3b8; font-size: 1.15rem; max-width: 800px; margin: 0 auto; }

        /* --- DASHBOARD DE FERRAMENTAS --- */
        .tools-dashboard { max-width: 1300px; margin: 0 auto 50px auto; padding: 0 5%; }

        /* 1. TOPO: CARDS DE FERRAMENTAS */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-bottom: 40px; }

        .tool-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 16px; padding: 25px;
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .tool-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .tool-icon { background: rgba(59, 130, 246, 0.1); color: var(--primary); padding: 12px; border-radius: 10px; display: flex; }
        .tool-icon svg { width: 24px; height: 24px; stroke-width: 2; }
        .tool-header h3 { font-size: 1.2rem; color: white; }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; align-items: center; }
        .data-label { color: #94a3b8; font-weight: 500; }
        .data-value { color: #e2e8f0; font-weight: bold; text-align: right; word-break: break-all; max-width: 65%; }
        .data-value.highlight { color: var(--accent); }

        .btn-tool {
            width: 100%; padding: 12px; margin-top: auto; background: rgba(59, 130, 246, 0.1);
            color: var(--primary); border: 1px solid var(--primary); border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-tool:hover { background: var(--primary); color: white; }

        input[type="text"] {
            width: 100%; padding: 12px; background: rgba(10, 15, 29, 0.8); border: 1px solid #334155;
            color: white; border-radius: 8px; outline: none; margin-bottom: 15px; font-size: 1rem; text-align: center;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .pass-display {
            background: #0f172a; padding: 15px; border-radius: 8px; border: 1px dashed #334155;
            text-align: center; font-family: monospace; font-size: 1.4rem; color: var(--accent);
            margin-bottom: 10px; letter-spacing: 2px; word-break: break-all;
        }
        .pass-strength-info { font-size: 0.85rem; color: #94a3b8; text-align: center; margin-bottom: 15px; line-height: 1.4; }
        .pass-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; color: #94a3b8; }
        .pass-controls input[type="range"] { flex: 1; margin: 0 15px; cursor: pointer; accent-color: var(--primary); }

        /* 2. MEIO: GERENCIADOR DE ARQUIVOS DO USUÁRIO */
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--success); border-radius: 16px; padding: 25px; margin-bottom: 40px; }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .icon-box { padding: 12px; border-radius: 10px; display: flex; width: 48px; height: 48px; align-items: center; justify-content: center; }
        .card-title { font-size: 1.3rem; font-weight: bold; }

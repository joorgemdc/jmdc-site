<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBM7EodWHzwOs7yI2V9UFngLtRvISLVELo",
            authDomain: "jmdc-crm.firebaseapp.com",
            projectId: "jmdc-crm",
            storageBucket: "jmdc-crm.firebasestorage.app",
            messagingSenderId: "495316438549",
            appId: "1:495316438549:web:f884f5834773cb87b3881c",
            measurementId: "G-ZB1GSMC1XW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const exibirAlerta = window.showAlert || function(msg) { alert(msg); };

        // --- OBSERVADOR DE ESTADO (ROTEAMENTO BLINDADO) ---
        // Se o Firebase confirmar que o usuário tem um token válido, joga para o painel.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            }
        });

        // --- PROCESSO DE CADASTRO ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-do-register');
            btn.innerText = "Processando..."; btn.disabled = true;

            const nome = document.getElementById('reg-nome').value.trim();
            const sobrenome = document.getElementById('reg-sobrenome').value.trim();
            const empresa = document.getElementById('reg-empresa').value.trim();
            const telefone = document.getElementById('reg-telefone').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                await setDoc(doc(db, "clientes", user.uid), {
                    nome: nome,
                    sobrenome: sobrenome,
                    empresa: empresa,
                    telefone: telefone,
                    email: email,
                    dataCadastro: serverTimestamp(),
                    status: "ativo",
                    nivelAcesso: "cliente" // Você alterará isso manualmente no console para "admin"
                });

                exibirAlerta("Conta provisionada com sucesso! Redirecionando...", true);
                // O onAuthStateChanged assumirá o roteamento a partir daqui.

            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') exibirAlerta("Este e-mail já possui cadastro.");
                else if (error.code === 'auth/weak-password') exibirAlerta("A senha deve ter no mínimo 6 caracteres.");
                else exibirAlerta("Erro na comunicação com o banco de dados.");
                
                btn.innerText = "Provisionar Conta"; btn.disabled = false;
            }
        });

        // --- PROCESSO DE LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-do-login');
            btn.innerText = "Autenticando..."; btn.disabled = true;

            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-pass').value;

            try {
                exibirAlerta("Analisando credenciais...", true);
                await signInWithEmailAndPassword(auth, email, pass);
                // O onAuthStateChanged assumirá o roteamento a partir daqui.

            } catch (error) {
                console.error(error);
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    exibirAlerta("Credenciais inválidas. Verifique o e-mail e a senha.");
                } else {
                    exibirAlerta("Falha na autenticação. Tente novamente.");
                }
                btn.innerText = "Acessar Painel"; btn.disabled = false;
            }
        });
    </script>

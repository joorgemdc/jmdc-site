<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDC | Dashboard do Cliente</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- ESTILOS GLOBAIS --- */
        :root {
            --bg-color: #0a0f1d; --text-color: #e2e8f0; --primary: #3b82f6; 
            --secondary: #1e293b; --accent: #10b981; --danger: #ef4444; 
            --warning: #f59e0b; --card-bg: rgba(30, 41, 59, 0.5); --card-border: rgba(59, 130, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; overflow-x: hidden; position: relative; display: flex; flex-direction: column; min-height: 100vh; }
        #network-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.2; pointer-events: none; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; text-align: center; padding: 20px;}
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(59, 130, 246, 0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        main { position: relative; z-index: 10; flex: 1; display: none; padding-top: 100px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; background: rgba(10, 15, 29, 0.95); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(59, 130, 246, 0.15); }
        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 40px; width: auto; transition: transform 0.3s ease; }
        .logo-img:hover { transform: scale(1.05); }
        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .btn-logout { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.1); }

        .dashboard-container { max-width: 1300px; margin: 0 auto; padding: 40px 5%; width: 100%; }
        
        .welcome-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        .welcome-header h1 { font-size: 2.5rem; font-weight: 800; color: #ffffff; display: flex; align-items: center; gap: 15px; }
        .welcome-header span { color: var(--primary); }
        .welcome-header p { color: #94a3b8; font-size: 1.1rem; margin-top: 10px; }
        .role-badge { border: 1px solid; padding: 4px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; display: none; letter-spacing: 1px; }
        .badge-admin { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); }
        .badge-suporte { background: rgba(16, 185, 129, 0.1); border-color: var(--accent); color: var(--accent); }

        .btn-action { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-action:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn-action:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .dash-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius: 16px; padding: 25px; transition: 0.3s ease; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .dash-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .dash-card.clickable { cursor: pointer; }
        .dash-card.clickable::after { content: 'Visualizar ↗'; position: absolute; bottom: 25px; right: 25px; font-size: 0.8rem; color: var(--primary); font-weight: bold; opacity: 0; transition: 0.3s; }
        .dash-card.clickable:hover::after { opacity: 1; right: 20px; }

        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .card-title { font-size: 1.2rem; font-weight: bold; color: white; }
        .card-icon { background: rgba(59, 130, 246, 0.1); color: var(--primary); padding: 10px; border-radius: 8px; display: flex; }
        .card-icon svg { width: 24px; height: 24px; }
        .card-value { font-size: 2.5rem; font-weight: 800; color: white; line-height: 1; margin-bottom: 10px; }
        .card-desc { font-size: 0.9rem; color: #94a3b8; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); margin-bottom: 15px;}

        /* Modais Gerais */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 15, 29, 0.85); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; }
